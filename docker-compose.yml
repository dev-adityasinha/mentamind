version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mentamind-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: mentamind
      POSTGRES_PASSWORD: mentamind_dev
      POSTGRES_DB: mentamind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentamind"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: mentamind-postgres-test
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: mentamind_test
      POSTGRES_PASSWORD: mentamind_test
      POSTGRES_DB: mentamind_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentamind_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mentamind-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
