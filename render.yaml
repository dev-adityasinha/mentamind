services:
  # ---- FastAPI backend ----
  - type: web
    name: mentamind-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    region: oregon
    healthCheckPath: /health
    # No dockerCommand override — the Dockerfile CMD (shell form) already runs
    # `alembic upgrade head && uvicorn ... --port ${PORT}`. Overriding it here
    # would pass the string in exec form, so /bin/sh can't interpret the `&&`.
    envVars:
      - key: ENVIRONMENT
        value: production
      # Async driver prefix required by SQLAlchemy/asyncpg. Render's fromDatabase
      # supplies a postgresql:// URL; we transform the scheme at startup (see note).
      - key: DATABASE_URL
        fromDatabase:
          name: mentamind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mentamind-redis
          property: connectionString
      - key: API_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # ENCRYPTION_KEY must be base64-encoded 32 bytes; generate manually and paste.
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: BEHIND_PROXY
        value: "true"
      # Free-tier (512MB) memory safeguard: don't start the APScheduler
      # reminder loop on boot. Flip to "true" on a larger instance to re-enable
      # daily mood / meditation / assessment reminder emails.
      - key: REMINDERS_ENABLED
        value: "false"
      # Force the lightweight AI provider so heavier SDKs never load.
      - key: AI_PROVIDER
        value: groq
      - key: MEDIA_DIR
        value: /app/media
      - key: MEDIA_BASE_URL
        sync: false
      # ---- SMTP email (invitations, verification, password reset) ----
      # If SMTP_USERNAME / SMTP_PASSWORD are unset, the app logs the email link
      # instead of sending. For Gmail, use an App Password (not your login
      # password) as SMTP_PASSWORD.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      # Optional integration — leave unset to disable, or paste key.
      - key: GROQ_API_KEY
        sync: false

  # ---- Redis (Render Key Value) ----
  - type: keyvalue
    name: mentamind-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: mentamind-db
    plan: free
    region: oregon
    databaseName: mentamind
    user: mentamind
